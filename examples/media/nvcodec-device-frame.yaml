# NV device-frame Profile (UP-06 gated). Not full CUDA Packet/Image zero-copy.
# Build:
#   cargo run -p dg-cli --no-default-features \
#     --features media,avcodec-profile-nvcodec-device-frame -- \
#     validate --config examples/media/nvcodec-device-frame.yaml
#
# Semantics:
#   Host H264 Packet -> NV decoder -> CudaDevice NV12 Image
#   CudaDevice NV12 Image -> NV encoder -> Host H264 Packet
#
# No media_resize: CUDA processor is unsupported; resize/CSC returns Unsupported
# rather than download/upload. Requires avcodec-profile-nvcodec-device-frame + CUDA.
apiVersion: dg/v1
kind: Graph
execution:
  parallel: sequential
nodes:
  - name: input
    kind: input
    params: {}
  - name: decode
    kind: media_decode
    params:
      profile: nvcodec-device-frame
      codec: h264
      bitstream_format: h264_annexb
  - name: encode
    kind: media_encode
    params:
      profile: nvcodec-device-frame
      codec: h264
      bitrate: 4000000
      time_base_num: 1
      time_base_den: 30
  - name: sink
    kind: sink
    params: {}
connections:
  - input.out -> decode.in
  - decode.out -> encode.in
  - encode.out -> sink.in
