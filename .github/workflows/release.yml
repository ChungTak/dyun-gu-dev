name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - aarch64-linux-android
          - riscv64gc-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          targets: ${{ matrix.target }}
      - if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - if: matrix.target == 'riscv64gc-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc-riscv64-linux-gnu
          echo "CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_LINKER=riscv64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - if: matrix.target == 'aarch64-linux-android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
      - if: matrix.target == 'aarch64-linux-android'
        run: |
          linker="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang"
          test -x "$linker"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$linker" >> "$GITHUB_ENV"
      - if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: echo 'CARGO_FLAGS=--features product-intel' >> "$GITHUB_ENV"
      - run: cargo build --release --locked --target ${{ matrix.target }} -p dg-cli -p dg-capi ${CARGO_FLAGS}
      - name: Package
        run: |
          package="dyun-gu-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "dist/$package/bin" "dist/$package/lib" "dist/$package/include" "dist/$package/examples" "dist/$package/docs"
          cp "target/${{ matrix.target }}/release/dg-cli" "dist/$package/bin/"
          find "target/${{ matrix.target }}/release" -maxdepth 1 -type f \
            \( -name 'libdg_capi.a' -o -name 'libdg_capi.so' \) \
            -exec cp {} "dist/$package/lib/" \;
          cp crates/dg-capi/include/dg_capi.h "dist/$package/include/"
          cp examples/*.yaml "dist/$package/examples/"
          cp README.md docs/user-guide.md "dist/$package/docs/"
          tar -C dist -czf "dist/$package.tar.gz" "$package"
      - uses: actions/upload-artifact@v4
        with:
          name: dyun-gu-${{ github.ref_name }}-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  oci:
    runs-on: ubuntu-latest
    # The OCI is the primary product artifact; it builds the x86_64
    # product-intel binary inside Docker and is independent of the tarball
    # cross-compilation matrix.
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract OCI metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push product-intel OCI
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Install cosign
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@v3

      - name: Sign OCI image with cosign
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

      - name: Save OCI digest
        if: steps.build.outputs.digest != ''
        run: echo "${{ steps.build.outputs.digest }}" > /tmp/oci-digest.txt

      - name: Upload OCI digest as artifact
        if: steps.build.outputs.digest != ''
        uses: actions/upload-artifact@v4
        with:
          name: dyun-gu-${{ github.ref_name }}-oci-digest
          path: /tmp/oci-digest.txt
          if-no-files-found: ignore
