name: ci

on:
  push:
  pull_request:

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: clippy
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
      - run: cargo test --workspace --locked

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
      - name: Package layout + C11 example smoke (CORE7-10)
        run: ./tools/package_smoke.sh --artifact-dir package-smoke
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: package-smoke
          path: package-smoke/
          retention-days: 7

  avcodec-profile-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: avcodec-profile-native-free
            install_ffmpeg: false
            run_tests: true
          - profile: avcodec-profile-software
            install_ffmpeg: true
            run_tests: true
          # Multi-profile isolation (explicit profile required; backend no cross-stack).
          - profile: avcodec-profile-native-free,avcodec-profile-software
            install_ffmpeg: true
            run_tests: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
      - name: Install FFmpeg development packages
        if: matrix.install_ffmpeg
        run: |
          # Runtime floor is libavcodec major >= 58 (FFmpeg 4+; UP4-002 f3c1c04).
          # Prefer FFmpeg 8 on runners when available; hard-fail only below 58.
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            clang \
            libclang-dev \
            libavutil-dev \
            libavcodec-dev \
            libavformat-dev \
            libswscale-dev \
            libswresample-dev
          echo "libavcodec=$(pkg-config --modversion libavcodec)"
          python3 - <<'PY'
          import subprocess, sys
          ver = subprocess.check_output(["pkg-config", "--modversion", "libavcodec"], text=True).strip()
          major = int(ver.split(".")[0])
          print(f"libavcodec major={major} full={ver}")
          if major < 58:
              print("::error::Software profile needs libavcodec >= 58 (FFmpeg 4.x+); got " + ver)
              sys.exit(1)
          PY
      - name: Prepare bindgen environment for software profiles
        if: matrix.install_ffmpeg
        run: |
          # shellcheck source=/dev/null
          source scripts/env-software-avcodec.sh
          echo "LIBCLANG_PATH=${LIBCLANG_PATH:-}" >> "$GITHUB_ENV"
          echo "BINDGEN_EXTRA_CLANG_ARGS=${BINDGEN_EXTRA_CLANG_ARGS:-}" >> "$GITHUB_ENV"
          echo "LIBYUV_TARGET=${LIBYUV_TARGET:-ubuntu-24.04_x86_64}" >> "$GITHUB_ENV"
      - name: Check dg-media profile
        env:
          LIBYUV_TARGET: ubuntu-24.04_x86_64
        run: cargo check -p dg-media --locked --features ${{ matrix.profile }}
      - name: Test dg-media profile
        if: matrix.run_tests
        env:
          LIBYUV_TARGET: ubuntu-24.04_x86_64
        run: cargo test -p dg-media --locked --features ${{ matrix.profile }}
      - name: Lockfile must not change
        run: git diff --exit-code Cargo.lock

  # NV Host/device-frame: CPU CI is compile-only only.
  # Production media sign-off is local/GPU runner with DYUN_NV_HW=1 (see plan4 Phase 3).
  # Do not treat this job as NV production passed.
  avcodec-nvcodec-compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile:
          - avcodec-profile-nvcodec-host
          - avcodec-profile-nvcodec-device-frame
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
      - name: Compile-only check (not production media evidence)
        env:
          LIBYUV_TARGET: ubuntu-24.04_x86_64
        run: cargo check -p dg-media --locked --features ${{ matrix.profile }}

  openvino:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: openvino-2026.2.1-${{ runner.os }}-${{ runner.arch }}
      - name: Install pinned OpenVINO CPU runtime
        run: python -m pip install --upgrade "openvino==2026.2.1"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: clippy
      - run: cargo clippy -p dg-openvino --features backend --all-targets -- -D warnings
      - run: cargo test -p dg-openvino --features backend
      - run: cargo test -p dg-openvino --features backend --test openvino_runtime -- --ignored --nocapture

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-fuzz --locked
      - run: cargo +nightly fuzz check graph-spec
      - run: cargo +nightly fuzz check capi-load-string
      - run: cargo +nightly fuzz check runtime-backend-options
      - run: cargo +nightly fuzz check capi-external-descriptor
      - run: cargo +nightly fuzz check tensor-shape-stride
      - run: cargo +nightly fuzz check media-metadata
      - run: cargo +nightly fuzz check reload-transitions

  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - aarch64-linux-android
          - riscv64gc-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          targets: ${{ matrix.target }}
      - run: cargo check --workspace --target ${{ matrix.target }}
