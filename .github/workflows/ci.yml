name: ci

on:
  push:
  pull_request:

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
          components: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
      - run: cargo test --workspace

  avcodec-profile-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: avcodec-profile-native-free
            install_ffmpeg: false
          - profile: avcodec-profile-software
            install_ffmpeg: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
      - name: Install FFmpeg development packages
        if: matrix.install_ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            clang \
            libclang-dev \
            libavutil-dev \
            libavcodec-dev \
            libavformat-dev \
            libswscale-dev \
            libswresample-dev
          echo "libavcodec=$(pkg-config --modversion libavcodec)"
      - name: Check dg-media profile
        env:
          LIBYUV_TARGET: ubuntu-24.04_x86_64
        run: cargo check -p dg-media --features ${{ matrix.profile }}
      - name: Test dg-media profile
        env:
          LIBYUV_TARGET: ubuntu-24.04_x86_64
        run: cargo test -p dg-media --features ${{ matrix.profile }}
      # FFmpeg 8 + avcodec-rs fc728aa hits UP2-FFMPEG-01 (*const AVCodec).
      # Job failure is intentional until upstream rev is bumped past the fix.

  openvino:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: openvino-2026.2.1-${{ runner.os }}-${{ runner.arch }}
      - name: Install pinned OpenVINO CPU runtime
        run: python -m pip install --upgrade "openvino==2026.2.1"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
          components: clippy
      - run: cargo clippy -p dg-openvino --features backend --all-targets -- -D warnings
      - run: cargo test -p dg-openvino --features backend
      - run: cargo test -p dg-openvino --features backend --test openvino_runtime -- --ignored --nocapture

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-fuzz --locked
      - run: cargo +nightly fuzz check graph-spec
      - run: cargo +nightly fuzz check capi-load-string
      - run: cargo +nightly fuzz check runtime-backend-options

  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - aarch64-linux-android
          - riscv64gc-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
          targets: ${{ matrix.target }}
      - run: cargo check --workspace --target ${{ matrix.target }}
