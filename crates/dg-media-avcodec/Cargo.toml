[package]
name = "dg-media-avcodec"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[features]
default = []

# Internal marker: enables the avcodec SDK dependency without selecting a profile.
avcodec-sdk = ["dep:avcodec"]

# Legacy alias mapping to the native-free compatibility profile.
avcodec = ["avcodec-profile-native-free"]

# Profile features (each depends on the SDK marker and upstream profile presets).
avcodec-profile-native-free = ["avcodec-sdk", "avcodec/native-free-software"]
avcodec-profile-software = ["avcodec-sdk", "avcodec/software-default"]
avcodec-profile-rkmpp-host = ["avcodec-sdk", "avcodec/rkmpp", "avcodec/librga"]
avcodec-profile-rkmpp-host-fallback = [
    "avcodec-sdk",
    "avcodec/rkmpp",
    "avcodec/librga",
    "avcodec/ffmpeg",
]
avcodec-profile-nvcodec-host = ["avcodec-sdk", "avcodec/nvcodec"]
avcodec-profile-nvcodec-host-fallback = ["avcodec-sdk", "avcodec/nvcodec", "avcodec/ffmpeg"]
avcodec-profile-onevpl-host = ["avcodec-sdk", "avcodec/onevpl"]
avcodec-profile-onevpl-host-fallback = ["avcodec-sdk", "avcodec/onevpl", "avcodec/ffmpeg"]
avcodec-profile-amf-host = ["avcodec-sdk", "avcodec/amf"]
avcodec-profile-amf-host-fallback = ["avcodec-sdk", "avcodec/amf", "avcodec/ffmpeg"]
# Stub profiles gated on upstream work; compile integration code but block session create.
avcodec-profile-rkmpp-zero-copy = ["avcodec-sdk", "avcodec/rkmpp", "avcodec/librga"]
avcodec-profile-nvcodec-device-frame = ["avcodec-sdk", "avcodec/nvcodec"]

# Legacy codec-* features retain direct backend enable semantics.
codec-ffmpeg = ["avcodec-sdk", "avcodec/ffmpeg"]
codec-x264 = ["avcodec-sdk", "avcodec/x264"]
codec-x265 = ["avcodec-sdk", "avcodec/x265"]
codec-openh264 = ["avcodec-sdk", "avcodec/openh264"]
codec-rkmpp = ["avcodec-sdk", "avcodec/rkmpp"]
codec-librga = ["avcodec-sdk", "avcodec/librga"]
codec-nvcodec = ["avcodec-sdk", "avcodec/nvcodec"]
codec-onevpl = ["avcodec-sdk", "avcodec/onevpl"]
codec-amf = ["avcodec-sdk", "avcodec/amf"]

[dependencies]
avcodec = { git = "https://github.com/TimothyWalker6922/avcodec-rs-develop.git", rev = "8ef5a72a50b396bad1a670fc2757893c059191a4", package = "avcodec", default-features = false, features = ["jpeg", "zune", "libyuv"], optional = true }